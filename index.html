<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#07090f"/>
<title>RozKamao 💰</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
body{background:#07090f;overflow:hidden;font-family:'DM Sans',sans-serif;display:flex;justify-content:center}
#app{width:100%;max-width:420px;height:100vh;position:relative;overflow:hidden;background:#07090f;color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-16px) rotate(3deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 18px rgba(255,215,0,0.3)}50%{box-shadow:0 0 50px rgba(255,165,0,0.7)}}
@keyframes ring{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.8);opacity:0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes coinDrop{0%{transform:translateY(-20px);opacity:1}100%{transform:translate(var(--bx),var(--by)) scale(0.2);opacity:0}}
@keyframes progressBar{from{width:0}to{width:100%}}
@keyframes navPop{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes taskIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes btnShine{0%{left:-100%}100%{left:200%}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(-60px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%)}to{opacity:0;transform:translateX(-50%) translateY(-40px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shimmer-text{font-family:'Syne',sans-serif;font-weight:800;background:linear-gradient(90deg,#FFD700 0%,#FFF3A0 40%,#FFD700 60%,#FF8C00 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 2.5s linear infinite}
.btn-primary{width:100%;padding:17px;border-radius:18px;border:none;background:linear-gradient(135deg,#FFD700,#FF8C00);font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#000;cursor:pointer;box-shadow:0 8px 28px rgba(255,165,0,0.35);position:relative;overflow:hidden;transition:transform 0.15s}
.btn-primary:active{transform:scale(0.96)}
.input-field{width:100%;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:12px}
.toast{position:fixed;top:18px;left:50%;background:linear-gradient(135deg,#0e1f10,#0b1a0d);border:1px solid rgba(0,255,135,0.4);border-radius:16px;padding:11px 22px;z-index:9999;font-size:13px;font-weight:600;color:#00FF87;box-shadow:0 8px 30px rgba(0,255,135,0.2);white-space:nowrap;font-family:'DM Sans',sans-serif}
.burst{position:fixed;pointer-events:none;z-index:998;font-size:20px;animation:coinDrop 0.8s ease-out forwards}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:40px">💰</div></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Wait for page to fully load
window.addEventListener('load', function() {

// ── FIREBASE ──
var firebaseConfig = {
  apiKey: "AIzaSyASJpgAH577g2X2QS4NsTteoBdC-jzGM5A",
  authDomain: "roz-kamao-pk.firebaseapp.com",
  projectId: "roz-kamao-pk",
  storageBucket: "roz-kamao-pk.firebasestorage.app",
  messagingSenderId: "663362493055",
  appId: "1:663362493055:web:57415cf30c58c0526dbd4a"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();
var FieldValue = firebase.firestore.FieldValue;

// ── DATA ──
var TASKS = [
  {id:"t1",icon:"▶️",name:"Video Dekho",desc:"30 sec ad — asaan coins!",coins:20,tag:"Easy ✅",tagBg:"rgba(0,255,135,0.2)",tagClr:"#00FF87",strip:"linear-gradient(180deg,#00FF87,#00C6FF)"},
  {id:"t2",icon:"📋",name:"Survey Bharo",desc:"5 sawaal, 2 minute",coins:50,tag:"Popular 🔥",tagBg:"rgba(255,200,0,0.18)",tagClr:"#FFD700",strip:"linear-gradient(180deg,#FFD700,#FF8C00)"},
  {id:"t3",icon:"📲",name:"App Install Karo",desc:"Partner app download karo",coins:80,tag:"Best Pay 💎",tagBg:"rgba(168,85,247,0.18)",tagClr:"#C084FC",strip:"linear-gradient(180deg,#C084FC,#818CF8)"},
  {id:"t4",icon:"🛍️",name:"AliExpress Deal",desc:"Affiliate link visit karo",coins:25,tag:"Quick ⚡",tagBg:"rgba(255,140,0,0.18)",tagClr:"#FF8C00",strip:"linear-gradient(180deg,#FF8C00,#FFD700)"},
  {id:"t5",icon:"👥",name:"Dost Ko Invite",desc:"Referral code share karo",coins:150,tag:"Max Coins ⭐",tagBg:"rgba(0,255,135,0.15)",tagClr:"#00FF87",strip:"linear-gradient(180deg,#00FF87,#00C6FF)"}
];
var REWARDS = [
  {id:"r1",icon:"💚",title:"Easypaisa",amount:"Rs. 100",coins:500},
  {id:"r2",icon:"🟠",title:"JazzCash",amount:"Rs. 100",coins:500},
  {id:"r3",icon:"💎",title:"Premium (1 Month)",amount:"2x Coins!",coins:300},
  {id:"r4",icon:"🎁",title:"Daraz Voucher",amount:"Rs. 200",coins:900}
];
var LEADERS = [
  {emoji:"🦁",name:"Ali Raza",city:"Lahore",coins:4820,pct:100},
  {emoji:"🌸",name:"Sana Khan",city:"Karachi",coins:3990,pct:83},
  {emoji:"⚡",name:"Usman Tariq",city:"Faisalabad",coins:3450,pct:72},
  {emoji:"🌙",name:"Hira Malik",city:"Multan",coins:2870,pct:60}
];
var OB = [
  {icon:"🪙",title:"Coins Kamao",sub:"Har Task Se!",desc:"Video dekho, surveys karo, apps install karo — coins kamate raho!"},
  {icon:"💸",title:"Real Paise",sub:"Withdraw Karo!",desc:"Easypaisa aur JazzCash pe seedha paise bhejo. Bilkul asaan!"},
  {icon:"👥",title:"Refer Karo",sub:"2x Kamao!",desc:"Har referral pe +150 coins — jitne zyada dost utna zyada earning!"}
];

// ── STATE ──
var S = {screen:'splash', tab:0, user:null, coins:0, completed:{}, claimed:{}, obSlide:0};
var appEl = document.getElementById('app');

// ── HELPERS ──
function showToast(msg){
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  t.style.animation='toastIn 0.4s cubic-bezier(.36,2,.5,1) both';
  document.body.appendChild(t);
  setTimeout(function(){t.style.animation='toastOut 0.3s ease both'; setTimeout(function(){t.remove();},300);},2500);
}
function addBursts(x,y){
  for(var i=0;i<7;i++){
    var b=document.createElement('div');
    b.className='burst'; b.textContent='🪙';
    b.style.left=x+'px'; b.style.top=y+'px';
    b.style.setProperty('--bx',((Math.random()-.5)*120)+'px');
    b.style.setProperty('--by',(-(40+Math.random()*80))+'px');
    b.style.animationDuration=(0.6+Math.random()*0.4)+'s';
    document.body.appendChild(b);
    setTimeout(function(){if(b.parentNode)b.remove();},1200);
  }
}
function activateBars(){
  setTimeout(function(){
    document.querySelectorAll('.bar-fill').forEach(function(b){
      b.style.width=b.getAttribute('data-w')+'%';
    });
  },800);
}

// ── RENDER ──
function render(){
  if(S.screen==='splash') renderSplash();
  else if(S.screen==='onboarding') renderOnboarding();
  else if(S.screen==='auth') renderAuth('login','');
  else if(S.screen==='main') renderMain();
}

// SPLASH
function renderSplash(){
  appEl.innerHTML='<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a1200,#07090f);display:flex;flex-direction:column;align-items:center;justify-content:center">'
  +'<div style="position:relative;margin-bottom:32px;animation:fadeUp 0.6s cubic-bezier(.36,2,.5,1) 0.3s both">'
  +'<div style="width:100px;height:100px;border-radius:28px;background:linear-gradient(135deg,#FFD700,#FF8C00);display:flex;align-items:center;justify-content:center;font-size:50px;animation:glow 2.5s ease-in-out 1s infinite;position:relative">💰'
  +'<div style="position:absolute;inset:0;border-radius:28px;border:2px solid rgba(255,215,0,0.6);animation:ring 1.8s ease-out 1s infinite"></div></div></div>'
  +'<div style="animation:fadeUp 0.5s ease 0.7s both"><span class="shimmer-text" style="font-size:38px">RozKamao</span></div>'
  +'<div style="font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:4px;text-transform:uppercase;margin-top:8px;animation:fadeUp 0.5s ease 0.9s both">Karo Kaam · Kamao Daam</div>'
  +'<div style="margin-top:56px;width:180px;height:3px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;animation:fadeUp 0.4s ease 1.1s both">'
  +'<div style="height:100%;border-radius:10px;background:linear-gradient(90deg,#FFD700,#FF8C00);animation:progressBar 2s ease 1.2s both"></div></div></div>';
  setTimeout(function(){ S.screen='onboarding'; render(); },3200);
}

// ONBOARDING
function renderOnboarding(){
  var s=OB[S.obSlide];
  appEl.innerHTML='<div style="position:absolute;inset:0;display:flex;flex-direction:column">'
  +'<div style="padding:20px 24px 0;display:flex;justify-content:flex-end">'
  +'<button onclick="S.screen=\'auth\';render()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:6px 16px;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer">Skip</button></div>'
  +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center">'
  +'<div style="position:relative;width:148px;height:148px;margin-bottom:36px">'
  +'<div style="position:absolute;inset:0;border-radius:42px;background:linear-gradient('+(S.obSlide*120)+'deg,#FFD700,#00FF87,#FF8C00);animation:spin 3s linear infinite"></div>'
  +'<div style="position:absolute;inset:3px;border-radius:40px;background:#0e1118;display:flex;align-items:center;justify-content:center;font-size:68px">'+s.icon+'</div></div>'
  +'<h2 style="font-family:\'Syne\',sans-serif;font-size:28px;font-weight:800;margin-bottom:12px;line-height:1.2">'+s.title+'<br><span class="shimmer-text" style="font-size:28px">'+s.sub+'</span></h2>'
  +'<p style="font-size:15px;color:rgba(255,255,255,0.45);line-height:1.65;max-width:280px">'+s.desc+'</p></div>'
  +'<div style="padding:24px 28px 44px">'
  +'<div style="display:flex;justify-content:center;gap:8px;margin-bottom:28px">'
  +[0,1,2].map(function(i){return '<div onclick="S.obSlide='+i+';renderOnboarding()" style="height:6px;border-radius:3px;cursor:pointer;background:'+(i===S.obSlide?'#FFD700':'rgba(255,255,255,0.18)')+';width:'+(i===S.obSlide?28:6)+'px;transition:all 0.4s"></div>';}).join('')
  +'</div>'
  +'<button class="btn-primary" onclick="'+(S.obSlide<2?'S.obSlide++;renderOnboarding()':'S.screen=\'auth\';render()')+'">'+( S.obSlide<2?'Aage Chalein →':'🎉 Shuru Karein!')+'</button>'
  +'</div></div>';
}

// AUTH
function renderAuth(mode,err){
  appEl.innerHTML='<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px">'
  +'<div style="font-size:52px;margin-bottom:16px;animation:float 3s ease-in-out infinite">💰</div>'
  +'<div style="margin-bottom:6px"><span class="shimmer-text" style="font-size:32px">RozKamao</span></div>'
  +'<div style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:36px;letter-spacing:2px;text-transform:uppercase">'+(mode==='login'?'Wapas Aagaye! 👋':'Naya Account Banao 🎉')+'</div>'
  +'<div style="width:100%;max-width:340px">'
  +(mode==='signup'?'<input class="input-field" id="nameI" placeholder="Tumhara Naam"/>':'')
  +'<input class="input-field" type="email" id="emailI" placeholder="Email Address"/>'
  +'<input class="input-field" type="password" id="passI" placeholder="Password (6+ characters)" style="margin-bottom:0"/>'
  +(err?'<div style="color:#FF6B6B;font-size:12px;margin:10px 0;text-align:center;font-weight:600">⚠️ '+err+'</div>':'')
  +'<div style="margin-top:16px"><button class="btn-primary" id="authBtn" onclick="doAuth(\''+mode+'\')">'+(mode==='login'?'Login Karo →':'Account Banao 🎉')+'</button></div>'
  +'<div style="text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.4)">'
  +(mode==='login'?'Pehli baar? ':'Account hai? ')
  +'<span onclick="renderAuth(\''+(mode==='login'?'signup':'login')+'\',\'\')" style="color:#FFD700;font-weight:700;cursor:pointer">'+(mode==='login'?'Signup Karo':'Login Karo')+'</span></div>'
  +(mode==='signup'?'<div style="margin-top:16px;background:rgba(0,255,135,0.06);border:1px solid rgba(0,255,135,0.15);border-radius:12px;padding:10px 14px;font-size:12px;color:rgba(255,255,255,0.4);text-align:center">🎁 Signup pe <span style="color:#00FF87;font-weight:700">+50 bonus coins</span>!</div>':'')
  +'</div></div>';
}

function doAuth(mode){
  var btn=document.getElementById('authBtn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Please wait...';}
  var email=document.getElementById('emailI')?document.getElementById('emailI').value.trim():'';
  var pass=document.getElementById('passI')?document.getElementById('passI').value:'';
  var name=document.getElementById('nameI')?document.getElementById('nameI').value.trim():'';
  var errs={'auth/email-already-in-use':'Email pehle se registered hai!','auth/wrong-password':'Galat password!','auth/invalid-credential':'Email ya password galat hai!','auth/user-not-found':'Account nahi mila!','auth/invalid-email':'Email sahi likho!','auth/weak-password':'Password 6+ characters!'};
  if(mode==='signup'){
    if(!name){renderAuth('signup','Naam dalein!');return;}
    auth.createUserWithEmailAndPassword(email,pass).then(function(cred){
      var ref='RK'+Math.random().toString(36).substr(2,6).toUpperCase();
      return db.collection('users').doc(cred.user.uid).set({name:name,email:email,coins:50,completedTasks:{},referrals:0,joined:new Date().toISOString(),premium:false,withdrawals:0,streak:1,referralCode:ref}).then(function(){
        S.user={uid:cred.user.uid,name:name,email:email,coins:50,referralCode:ref,referrals:0,withdrawals:0};
        S.coins=50; S.screen='main'; render();
      });
    }).catch(function(e){renderAuth('signup',errs[e.code]||'Kuch ghalat hua!');});
  } else {
    auth.signInWithEmailAndPassword(email,pass).then(function(cred){
      return db.collection('users').doc(cred.user.uid).get().then(function(snap){
        if(snap.exists){
          var d=snap.data();
          S.user=Object.assign({uid:cred.user.uid},d);
          S.coins=d.coins||0;
          S.completed=d.completedTasks||{};
          S.screen='main'; render();
        }
      });
    }).catch(function(e){renderAuth('login',errs[e.code]||'Kuch ghalat hua!');});
  }
}

// MAIN
function renderMain(){
  var tabs=[{icon:'🏠',label:'Home'},{icon:'🎁',label:'Rewards'},{icon:'👥',label:'Refer'},{icon:'👤',label:'Profile'}];
  appEl.innerHTML='<div style="display:flex;flex-direction:column;height:100vh">'
  +'<div id="tabContent" style="flex:1;overflow-y:auto;padding-bottom:90px"></div>'
  +'<div style="background:rgba(7,9,15,0.96);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-around;align-items:center;padding:10px 0 18px;flex-shrink:0;animation:navPop 0.6s cubic-bezier(.36,2,.5,1) 0.5s both">'
  +tabs.map(function(t,i){
    return '<div onclick="S.tab='+i+';renderTab()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 14px">'
    +'<div style="width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:'+(S.tab===i?'linear-gradient(135deg,#FFD700,#FF8C00)':'transparent')+';transform:'+(S.tab===i?'scale(1.1) translateY(-2px)':'scale(1)')+';transition:all 0.28s;box-shadow:'+(S.tab===i?'0 4px 16px rgba(255,165,0,0.4)':'none')+'">'+t.icon+'</div>'
    +'<div style="font-size:10px;font-weight:600;color:'+(S.tab===i?'#FFD700':'rgba(255,255,255,0.28)')+'">'+t.label+'</div></div>';
  }).join('')
  +'</div></div>';
  renderTab();
}

function renderTab(){
  var tc=document.getElementById('tabContent');
  if(!tc)return;
  if(S.tab===0){tc.innerHTML=homeHTML();activateBars();}
  else if(S.tab===1)tc.innerHTML=rewardsHTML();
  else if(S.tab===2)tc.innerHTML=referHTML();
  else if(S.tab===3)tc.innerHTML=profileHTML();
}

function homeHTML(){
  var u=S.user;
  var tasksHtml=TASKS.map(function(t,i){
    var done=S.completed[t.id];
    return '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:13px;opacity:'+(done?0.55:1)+';animation:taskIn 0.4s ease '+(0.28+i*0.07)+'s both;position:relative;overflow:hidden">'
    +'<div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:'+t.strip+'"></div>'
    +'<div style="width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">'+t.icon+'</div>'
    +'<div style="flex:1"><div style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:700;margin-bottom:3px">'+t.name+'</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,0.38);margin-bottom:5px">'+t.desc+'</div>'
    +'<div style="display:inline-block;background:'+t.tagBg+';color:'+t.tagClr+';border-radius:7px;padding:2px 8px;font-size:10px;font-weight:700">'+t.tag+'</div></div>'
    +'<button onclick="doTask(\''+t.id+'\','+t.coins+',event)" style="display:flex;flex-direction:column;align-items:center;gap:3px;background:'+(done?'rgba(0,255,135,0.13)':'linear-gradient(135deg,#FFD700,#FF8C00)')+';border:none;border-radius:13px;padding:9px 13px;cursor:pointer;flex-shrink:0">'
    +(done?'<span style="font-size:18px;color:#00FF87">✓</span><span style="font-size:9px;font-weight:700;color:#00FF87">Done!</span>'
    :'<span style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:800;color:#000;line-height:1">+'+t.coins+'</span><span style="font-size:9px;font-weight:700;color:rgba(0,0,0,0.6)">🪙 COINS</span>')
    +'</button></div>';
  }).join('');

  var leadHtml=LEADERS.map(function(l,i){
    return '<div style="display:flex;align-items:center;gap:12px;margin-bottom:'+(i<3?12:0)+'px">'
    +'<div style="font-size:16px;width:22px;text-align:center">'+['🥇','🥈','🥉','4️⃣'][i]+'</div>'
    +'<div style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+l.emoji+'</div>'
    +'<div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">'+l.name+' <span style="font-size:10px;color:rgba(255,255,255,0.33)">· '+l.city+'</span></span>'
    +'<span style="font-family:\'Syne\',sans-serif;font-size:13px;font-weight:800;color:#FFD700">'+l.coins.toLocaleString()+' 🪙</span></div>'
    +'<div style="height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:5px">'
    +'<div class="bar-fill" data-w="'+l.pct+'" style="height:4px;border-radius:2px;background:linear-gradient(90deg,#00FF87,#FFD700);width:0%;transition:width 1s ease '+(0.5+i*0.15)+'s"></div>'
    +'</div></div></div>';
  }).join('');

  return '<div style="padding:22px 20px 0;animation:fadeUp 0.5s ease both">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">'

function doTask(id,coins,e){
  if(S.completed[id])return;
  var rect=e.currentTarget.getBoundingClientRect();
  S.completed[id]=true;
  S.coins+=coins;
  addBursts(rect.left+rect.width/2,rect.top+rect.height/2);
  showToast('+'+coins+' 🪙 Task complete!');
  renderTab();
  if(S.user){
    var upd={coins:FieldValue.increment(coins)};
    upd['completedTasks.'+id]=true;
    db.collection('users').doc(S.user.uid).update(upd).catch(function(){});
  }
}

function claimReward(id,coins,title,amount){
  if(S.claimed[id])return;
  if(S.coins<coins){showToast('❌ '+(coins-S.coins)+' aur coins chahiye!');return;}
  S.coins-=coins; S.claimed[id]=true;
  showToast('🎉 '+title+' '+amount+' claimed!');
  renderTab();
  if(S.user){db.collection('users').doc(S.user.uid).update({coins:FieldValue.increment(-coins),withdrawals:FieldValue.increment(1)}).catch(function(){});}
}

// AUTO LOGIN
auth.onAuthStateChanged(function(u){
  if(u && S.screen==='splash'){
    db.collection('users').doc(u.uid).get().then(function(snap){
      if(snap.exists){
        var d=snap.data();
        S.user=Object.assign({uid:u.uid},d);
        S.coins=d.coins||0;
        S.completed=d.completedTasks||{};
        setTimeout(function(){ S.screen='main'; render(); },3200);
      }
    }).catch(function(){});
  }
});

render();
